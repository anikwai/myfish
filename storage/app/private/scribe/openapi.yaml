openapi: 3.0.3
info:
  title: "Laravel API Documentation"
  description: "REST API for the myfish mobile application. All authenticated endpoints require a Sanctum Bearer token obtained from the login endpoint."
  version: 1.0.0
servers:
  - url: "https://myfish.test"
tags:
  - name: "Admin - Business"
    description: ""
  - name: "Admin - Catalogue"
    description: ""
  - name: "Admin - Orders"
    description: ""
  - name: "Admin - Reports"
    description: ""
  - name: "Admin - Reviews"
    description: ""
  - name: Authentication
    description: ""
  - name: Endpoints
    description: ""
  - name: "Guest Orders"
    description: ""
  - name: Notifications
    description: ""
  - name: Orders
    description: ""
  - name: Profile
    description: ""
  - name: Reviews
    description: ""
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: "Obtain a token via <code>POST /api/v1/auth/login</code>. Pass it as <code>Authorization: Bearer {token}</code>."
security:
  - default: []
