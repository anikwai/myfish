        - "Admin - Business"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                business_name:
                  type: string
                  description: "Must not be greater than 255 characters."
                  example: b
                business_address:
                  type: string
                  description: "Must not be greater than 255 characters."
                  example: "n"
                  nullable: true
                business_phone:
                  type: string
                  description: "Must not be greater than 50 characters."
                  example: g
                  nullable: true
                business_email:
                  type: string
                  description: "Must be a valid email address. Must not be greater than 255 characters."
